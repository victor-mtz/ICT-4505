<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order details</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <main id="main-shopping-cart">
        <header id="shopping-cart-header">Order Details</header>
        <ul id="shopping-cart-list">
            <li id="shopping-cart-item">
                <div id="item-properties">
                    <img id="shopping-cart-item-img"  src="resources/adidas_predator.jpeg" alt="Adidas Predator football boot"/>
                    <section id="shopping-cart-item-edit">
                        <button>Cancel Order</button>
                        <button>Duplicate Order</button>
                    </section>
                </div>
                <div id="shopping-cart-item-details">
                    <p>Adidas Predator</p>
                    <p>A sturdy soccer cleat line built for control and power.</p>
                    <p>Number of items: 2</p>
                </div>
            </li>
            <li id="shopping-cart-item">
                <div id="item-properties">
                    <img id="shopping-cart-item-img" src="resources/nike_mercurial.jpeg" alt="Nike Mercurial football boot"/>
                    <section id="shopping-cart-item-edit">
                        <button>Cancel Order</button>
                        <button>Duplicate Order</button>
                    </section>
                </div>
                <div id="shopping-cart-item-details">
                    <p>Nike Mercurial</p>
                    <p>A lightweight soccer cleat line built for explosive
                        speed.</p>
                        <p>Number of items: 1</p>
                </div>
            </li>
            <li id="shopping-cart-item">
                <div id="item-properties">
                    <img id="shopping-cart-item-img" src="resources/gloves-1.jpeg" alt="Goal keeper gloves"/>
                    <section id="shopping-cart-item-edit">
                        <button>Cancel Order</button>
                        <button>Duplicate Order</button>
                    </section>
                </div>
                <div id="shopping-cart-item-details">
                    <p>Goalkeeper Gloves</p>
                    <p>For goalkeepers.</p>
                    <p>Number of items: 3</p>
                </div>
            </li>
        </ul>
    </main>
</body>
</html>
