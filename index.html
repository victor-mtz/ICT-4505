<!doctype html>
<html lang="en">
  <head>
    <title>Welcome to ...</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script src="index.js" defer></script>
    <header>
      <h1>Find all your footballing needs here!</h1>
      <img src="./resources/store_logo.jpeg" alt="store-logo" />
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact Us</a>
        <div id="shopping-cart-container" title="Shopping Cart">
          <a href="shopping-cart.html">
            <img
              id="shopping-cart-img"
              src="./resources/shopping_cart.png"
              alt="shopping-cart-image"
            />
          </a>
        </div>
      </nav>
    </header>
    <main>
      <div id="cleats-section">
        <h2 id="cleats-heading">Cleats</h2>
        <ul id="main-page-list" class="cleats-list">
          <li>
            <div class="lists" id="nike-mercurial">
              <a href="https://www.nike.com/mercurial" target="_blank"
                >Nike Mercurial</a
              >
              <span>$220</span>
              <img
                class="product-image"
                src="resources/nike_mercurial.jpeg"
                alt="Nike Mercurial football boot"
                data-tooltip="A lightweight soccer cleat line built for explosive
                speed."
              />
            </div>
          </li>
          <li>
            <div class="lists" id="adidas-predator">
              <a
                href="https://www.adidas.com/us/predator-cleats"
                target="_blank"
                >Adidas Predator</a
              >
              <span>$220</span>
              <img
                class="product-image"
                src="resources/adidas_predator.jpeg"
                alt="Adidas Predator football boot"
                data-tooltip="A sturdy soccer cleat line built for control and power."
              />
            </div>
          </li>
        </ul>
      </div>
      <div id="kits-section">
        <h2 id="kits-heading">Kits</h2>
        <ul class="kits-list">
          <li>
            <div class="lists" id="kit-1">
              <a href="https://www.adidas.com/us/soccer-jerseys" target="_blank"
                >Kit 1</a
              >
              <span>$120</span>
              <img
                class="product-image"
                src="resources/kit_1.jpeg"
                alt="Optional kit 1"
                data-tooltip="Customizable with team name and player name and number."
              />
            </div>
          </li>
          <li>
            <div class="lists" id="kit-2">
              <a href="https://www.adidas.com/us/soccer-jerseys" target="_blank"
                >Kit 2</a
              >
              <span>$120</span>
              <img
                class="product-image"
                src="resources/kit_2.jpeg"
                alt="Optional kit 2"
                data-tooltip="Customizable with team name and player name and number."
              />
            </div>
          </li>
        </ul>
      </div>
      <div id="and-more-section">
        <h2 id="and-more-heading">And More!</h2>
        <ul class="and-more-list">
          <li>
            <div class="lists" id="and-more-1">
              <a href="https://www.adidas.com/us/soccer-gloves" target="_blank"
                >Keeper Gloves</a
              >
              <span>$80</span>
              <img
                class="product-image"
                src="resources/gloves-1.jpeg"
                alt="Keeper gloves"
                data-tooltip="For goalkeepers."
              />
            </div>
          </li>
          <li>
            <div class="lists" id="and-more-2">
              <a
                href="https://www.nike.com/w/soccer-shin-guards-1gdj0z62q6x"
                target="_blank"
                >Shin Guards</a
              >
              <span>$80</span>
              <img
                class="product-image"
                src="resources/shin-guard-1.webp"
                alt="Shin guards"
                data-tooltip="Offer maximum protection."
              />
            </div>
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
